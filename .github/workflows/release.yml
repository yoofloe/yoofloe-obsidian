name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run build:mcp
      - run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED

          root = Path('.')
          zip_path = root / 'yoofloe-obsidian-mcp-wrapper.zip'
          with ZipFile(zip_path, 'w', ZIP_DEFLATED) as zip_file:
              zip_file.write(root / 'mcp-server.js', 'mcp-server.js')
              zip_file.write(root / 'docs' / 'README-mcp-wrapper.txt', 'README-mcp-wrapper.txt')
          print(f'Created {zip_path}')
          PY
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            yoofloe-obsidian-mcp-wrapper.zip
