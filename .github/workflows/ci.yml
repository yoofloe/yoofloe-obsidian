name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security scan
        run: npm run security:scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Type check
        run: npm run check

      - name: Run lint
        run: npm run lint

      - name: Build plugin
        run: npm run build

      - name: Build MCP wrapper
        run: npm run build:mcp
